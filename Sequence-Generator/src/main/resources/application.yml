spring:
  config:
    import: optional:nacos:${spring.application.name}.yml
  application:
    name: sequence-generator

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml

  datasource:
    url: jdbc:mysql://localhost:3307/sequence_generator
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8083
