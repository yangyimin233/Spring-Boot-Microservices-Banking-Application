# ============================================
# Banking Microservices — 微服务容器编排
# ============================================
# 使用方式:
#   1. 先构建所有 JAR:  mvn package -DskipTests (每个模块在 IDEA 中执行)
#   2. 启动所有服务:    docker compose up -d --build
#   3. 查看日志:         docker compose logs -f
#   4. 停止:             docker compose down
# ============================================

services:
  # ====== 基础设施 ======
  mysql:
    image: mysql:8.0
    container_name: bank-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - bank-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bank-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bank
      RABBITMQ_DEFAULT_PASS: bank123

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: bank-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone

  # ====== 微服务 ======
  # 环境变量覆盖 application.yml 中的 localhost 地址，
  # 容器间通过 Docker 内部网络通信（服务名即主机名）

  sequence-generator:
    build: ./Sequence-Generator
    container_name: seq-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sequence_generator
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    restart: on-failure

  user-service:
    build: ./User-Service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_service
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    restart: on-failure

  account-service:
    build: ./Account-Service
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/account_service
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    restart: on-failure

  transaction-service:
    build: ./Transaction-Service
    container_name: tx-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/transaction_service
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      XXL_JOB_ADMIN_ADDRESSES: http://host.docker.internal:8092/xxl-job-admin
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    restart: on-failure

  fund-transfer:
    build: ./Fund-Transfer
    container_name: ft-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fund_transfer_service
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    restart: on-failure

  api-gateway:
    build: ./API-Gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_started
    restart: on-failure

volumes:
  bank-mysql-data:
