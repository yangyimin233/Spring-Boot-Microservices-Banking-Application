spring:
  application:
    name: transaction-service
    bad_request: 400
    conflict: 409
    ok: 200

  datasource:
    url: jdbc:mysql://localhost:3307/transaction_service
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


# 👇 绝杀1：seata 必须顶格写！和 spring 处在同一列！
seata:
  enabled: true
  application-id: ${spring.application.name} # 告诉 TC 我是谁
  tx-service-group: my_test_tx_group # 事务分组名
  # 👇 绝杀2：你心心念念的强一致性 XA 模式！
  data-source-proxy-mode: XA
  service:
    vgroup-mapping:
      my_test_tx_group: default # 映射到 TC 集群
    grouplist:
      default: 127.0.0.1:8091 # 你的 Seata Server 地址



server:
  port: 8084